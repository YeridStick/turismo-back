server:
  port: "${SERVER_PORT:7860}"
  forward-headers-strategy: framework

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true
    prometheus:
      enabled: ${PROMETHEUS_ENABLED:false}

spring:
  main:
    banner-mode: off
    log-startup-info: false
  application:
    name: "${APP_NAME:turismo}"
  codec:
    max-in-memory-size: 256KB
  data:
    redis:
      host: "${REDIS_HOST}"
      port: "${REDIS_PORT:6379}"
      password: "${REDIS_PASSWORD}"
      database: "${REDIS_DB:0}"
      timeout: "${REDIS_TIMEOUT:3s}"
      ssl:
        enabled: ${REDIS_SSL:true}

  r2dbc:
    postgresql:
      host: "${DB_HOST}"
      port: "${DB_PORT}"
      database: "${DB_NAME}"
      schema: "${DB_SCHEMA}"
      username: "${DB_USER}"
      password: "${DB_PASSWORD}"
    pool:
      initial-size: "${CONN_POOL_INITIAL_SIZE:2}"
      max-size: "${CONN_POOL_MAX_SIZE:6}"
      max-idle-time: "${CONN_POOL_IDLE_TIME:5m}"

  # compat si algún bean lee estas claves viejas
  connection-pool:
    initial-size: "${CONN_POOL_INITIAL_SIZE:2}"
    max-size: "${CONN_POOL_MAX_SIZE:6}"
    max-idle-time: "${CONN_POOL_IDLE_TIME:300}"


# OpenAPI / SpringDoc Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SPRINGDOC_ENABLED:true}
  show-actuator: false

# Scalar API Reference Configuration
scalar:
  title: "${SCALAR_TITLE:Turismo API Documentation}"
  theme: "${SCALAR_THEME:purple}"
  dark-mode: "${SCALAR_DARK_MODE:false}"
  layout: "${SCALAR_LAYOUT:modern}"
  show-sidebar: "${SCALAR_SHOW_SIDEBAR:true}"
  hide-models: "${SCALAR_HIDE_MODELS:false}"
  hide-download-button: "${SCALAR_HIDE_DOWNLOAD_BUTTON:false}"
  search-hot-key: "${SCALAR_SEARCH_HOT_KEY:k}"

cors:
  allowed-origins: "https://client.scalar.com,http://localhost:8083,http://localhost:8081,http://localhost:5173,https://lambent-centaur-494d0b.netlify.app,https://5173-firebase-turismo-frontgit-1760412767848.cluster-lr6dwlc2lzbcctqhqorax5zmro.cloudworkstations.dev,http://localhost:8089/,http://192.168.56.1:5173,http://192.168.20.15:5173,https://turismo-eta-swart.vercel.app"

security:
  jwt:
    secret: "${JWT_SECRET}"
  session:
    bind-ip: ${SEC_BIND_IP:false}
    refresh-grace-minutes: ${SEC_REFRESH_GRACE_MINUTES:15}
    redis:
      key-prefix: "${SEC_REDIS_KEY_PREFIX}"

turismo:
  rate-limiter:
    enabled: ${RATE_LIMIT_ENABLED:true}
    backend: ${RATE_LIMIT_BACKEND:redis}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
    capacity: ${RATE_LIMIT_CAPACITY:600}
    refill-per-window: ${RATE_LIMIT_REFILL:600}
    redis:
      key-prefix: "${RATE_LIMIT_REDIS_KEY_PREFIX}"
    per-path:
      "/api/auth":
        capacity: ${RATE_LIMIT_AUTH_CAPACITY:30}
        window-seconds: ${RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
        refill-per-window: ${RATE_LIMIT_AUTH_REFILL:30}
      "/api/places":
        capacity: ${RATE_LIMIT_PLACES_CAPACITY:1500}
        window-seconds: ${RATE_LIMIT_PLACES_WINDOW_SECONDS:60}
        refill-per-window: ${RATE_LIMIT_PLACES_REFILL:1500}
    skip-paths:
      - /actuator/health
      - /actuator/prometheus
      - /favicon.ico
      - /
      - /v3/api-docs
      - /v3/api-docs/**
      - /scalar
      - /docs

locationiq:
  key: "${LOCATIONIQ_KEY}"
  base-url: https://us1.locationiq.com/v1
  timeout-ms: 5000

geocode:
  daily-quota: 100
  cache-ttl-days: 30

app:
  public-url: "${APP_PUBLIC_URL}"
  frontend-url: "${APP_FRONTEND_URL}"

logging:
  level:
    root: INFO
    co.turismo.brevo: INFO
    co.turismo.usecase.authenticate.AccountRecoveryUseCase: INFO
    co.turismo.r2dbc.usersRepository.adapter.UserRepositoryAdapter: INFO

brevo:
  base-url: "${BREVO_BASE_URL:https://api.brevo.com/v3}"
  api-key: "${BREVO_API_KEY}"
  mcp-api-key: "${BREVO_MCP_API_KEY}"
  sender:
    email: "${BREVO_SENDER_EMAIL}"
    name: "${BREVO_SENDER_NAME}"
