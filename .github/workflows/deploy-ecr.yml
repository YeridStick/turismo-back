name: Build and Deploy to ECR

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: turismo/backend
  EKS_CLUSTER_NAME: turismo-cluster
  K8S_SECRET_NAME: turismo-env

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    environment: Turismo / production
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate AWS secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then echo "AWS_ACCESS_KEY_ID missing"; exit 1; fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then echo "AWS_SECRET_ACCESS_KEY missing"; exit 1; fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building image..."
          docker build \
            --file deployment/Dockerfile \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          echo "Pushing image..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    environment: Turismo / production
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then echo "AWS_ACCESS_KEY_ID missing"; exit 1; fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then echo "AWS_SECRET_ACCESS_KEY missing"; exit 1; fi
          if [ -z "${{ secrets.TURISMO_ENV_FILE }}" ]; then echo "TURISMO_ENV_FILE missing"; exit 1; fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --alias turismo-cluster

      - name: Verify cluster access
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Create or update Kubernetes Secret
        run: |
          cat > .env <<'EOF'
          ${{ secrets.TURISMO_ENV_FILE }}
          EOF
          
          echo "Validating duplicated env keys..."
          DUPLICATES=$(grep -v '^\s*#' .env | grep -v '^\s*$' | cut -d '=' -f1 | sort | uniq -d)
          
          if [ -n "$DUPLICATES" ]; then
            echo "Duplicated env keys found:"
            echo "$DUPLICATES"
            exit 1
          fi
          
          kubectl delete secret ${{ env.K8S_SECRET_NAME }} --ignore-not-found
          kubectl create secret generic ${{ env.K8S_SECRET_NAME }} --from-env-file=.env

      - name: Deploy to EKS
        env:
          IMAGE_FULL: ${{ needs.build-and-push-docker.outputs.image }}
        run: |
          echo "Deploying image: $IMAGE_FULL"
          sed "s|IMAGE_PLACEHOLDER|$IMAGE_FULL|g" deployment/k8s/deployment.yaml | kubectl apply -f -

      - name: Check deployment status
        run: |
          echo "Waiting for rollout..."
          kubectl rollout status deployment/app-service --timeout=300s
          echo "Pods:"
          kubectl get pods -o wide
          echo "Services:"
          kubectl get svc